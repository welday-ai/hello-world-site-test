<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welday Enterprises Links</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --card: #ffffff;
        --text: #162031;
        --muted: #5b6b83;
        --border: #dce3ee;
        --accent: #1068e8;
        --accent-soft: #e8f1ff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, #eef4ff, var(--bg) 35%);
        color: var(--text);
      }
      .wrap {
        max-width: 1120px;
        margin: 0 auto;
        padding: 28px 20px 40px;
      }
      h1 {
        margin: 0;
        font-size: clamp(1.6rem, 2.8vw, 2.2rem);
      }
      .sub {
        margin: 8px 0 0;
        color: var(--muted);
      }
      .toolbar {
        margin-top: 20px;
        display: grid;
        gap: 10px;
        grid-template-columns: 1fr auto;
      }
      input {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 11px 12px;
        font-size: 0.95rem;
      }
      .count {
        border: 1px solid var(--border);
        background: #fff;
        border-radius: 10px;
        padding: 10px 12px;
        color: var(--muted);
        white-space: nowrap;
      }
      .grid {
        margin-top: 16px;
        display: grid;
        gap: 14px;
        grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 14px;
        box-shadow: 0 1px 2px rgba(19, 35, 60, 0.06);
      }
      .venture {
        font-size: 1.03rem;
        font-weight: 600;
        margin-bottom: 10px;
      }
      ul {
        list-style: none;
        padding: 0;
        margin: 0;
        display: grid;
        gap: 8px;
      }
      li {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 10px;
        background: #fcfdff;
      }
      a {
        color: var(--accent);
        text-decoration: none;
      }
      a:hover { text-decoration: underline; }
      .meta {
        margin-top: 2px;
        font-size: 0.8rem;
        color: var(--muted);
      }
      .empty {
        color: var(--muted);
        font-size: 0.9rem;
        background: var(--accent-soft);
        border: 1px dashed #b9d1ff;
        border-radius: 8px;
        padding: 10px;
      }
      .foot {
        margin-top: 14px;
        color: var(--muted);
        font-size: 0.85rem;
      }
      @media (max-width: 700px) {
        .toolbar { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>Welday Enterprises Links</h1>
      <p class="sub">Pulled from the Welday dashboard venture/app records.</p>
      <div class="toolbar">
        <input id="search" type="search" placeholder="Filter by venture, app name, or URL" />
        <div id="count" class="count">Loading...</div>
      </div>
      <section id="grid" class="grid" aria-live="polite"></section>
      <p class="foot">Generated on 2026-04-01 from <code>https://welday-ent-dashboard.lovable.app</code>.</p>
    </main>

    <script>
      const grid = document.getElementById("grid");
      const count = document.getElementById("count");
      const search = document.getElementById("search");

      function normalizeUrl(url) {
        return url.replace(/^https:\/\/https:\/\//, "https://").trim();
      }

      function render(data, filterText = "") {
        const q = filterText.trim().toLowerCase();
        const filtered = data
          .map((venture) => {
            const links = venture.links.filter((link) => {
              const url = normalizeUrl(link.url);
              const haystack = `${venture.venture} ${link.name} ${url}`.toLowerCase();
              return haystack.includes(q);
            });
            const ventureMatch = venture.venture.toLowerCase().includes(q);
            if (ventureMatch && links.length === 0 && q) return { ...venture, links: venture.links };
            return { ...venture, links };
          })
          .filter((venture) => venture.links.length > 0 || (q === "" && venture.links.length === 0));

        const totalLinks = filtered.reduce((n, venture) => n + venture.links.length, 0);
        count.textContent = `${filtered.length} ventures | ${totalLinks} links`;

        if (filtered.length === 0) {
          grid.innerHTML = `<div class="empty">No matches found for this filter.</div>`;
          return;
        }

        grid.innerHTML = filtered
          .map((venture) => {
            const items = venture.links.length
              ? `<ul>${venture.links
                  .map((link) => {
                    const url = normalizeUrl(link.url);
                    return `<li><a href="${url}" target="_blank" rel="noopener noreferrer">${link.name}</a><div class="meta">${link.type} · ${url}</div></li>`;
                  })
                  .join("")}</ul>`
              : `<div class="empty">No URL stored yet for this venture in the dashboard data.</div>`;
            return `<article class="card"><div class="venture">${venture.venture}</div>${items}</article>`;
          })
          .join("");
      }

      fetch("./data/links.json")
        .then((res) => {
          if (!res.ok) throw new Error(`Failed to load links (${res.status})`);
          return res.json();
        })
        .then((data) => {
          render(data);
          search.addEventListener("input", () => render(data, search.value));
        })
        .catch((err) => {
          count.textContent = "Load error";
          grid.innerHTML = `<div class="empty">${err.message}</div>`;
        });
    </script>
  </body>
</html>
